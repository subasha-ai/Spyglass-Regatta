<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Spyglass Regatta</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --slate-900: #0f172a; --slate-800: #1e293b; --slate-700: #334155; --slate-600: #475569;
      --slate-500: #64748b; --slate-400: #94a3b8; --slate-300: #cbd5e1; --slate-200: #e2e8f0;
      --cyan-400: #22d3ee; --cyan-500: #06b6d4; --teal-400: #2dd4bf; --teal-500: #14b8a6;
      --emerald-400: #34d399; --emerald-500: #10b981;
      --white-10: rgba(255,255,255,0.1); --white-20: rgba(255,255,255,0.2); --white-05: rgba(255,255,255,0.05);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', -apple-system, sans-serif; background: linear-gradient(135deg, var(--slate-900) 0%, var(--slate-800) 50%, var(--slate-900) 100%); min-height: 100vh; color: var(--slate-200); }
    .bg-pattern { position: fixed; inset: 0; opacity: 0.2; background-image: radial-gradient(circle at 2px 2px, rgba(100, 200, 255, 0.3) 1px, transparent 0); background-size: 40px 40px; pointer-events: none; z-index: 0; }
    .header { position: sticky; top: 0; z-index: 50; background: var(--white-10); backdrop-filter: blur(20px); border-bottom: 1px solid var(--white-20); box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); }
    .header-content { max-width: 1600px; margin: 0 auto; padding: 1.25rem 2rem; display: flex; justify-content: space-between; align-items: center; }
    .logo { display: flex; align-items: center; gap: 1rem; }
    .logo-icon { position: relative; }
    .logo-icon::before { content: ''; position: absolute; inset: 0; background: linear-gradient(135deg, var(--cyan-400), var(--teal-500)); border-radius: 16px; filter: blur(12px); opacity: 0.75; animation: pulse 2s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 0.75; } 50% { opacity: 0.5; } }
    .logo-box { position: relative; width: 56px; height: 56px; background: linear-gradient(135deg, var(--cyan-400), var(--teal-500), var(--emerald-500)); border-radius: 16px; display: flex; align-items: center; justify-content: center; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); transform: rotate(6deg); transition: transform 0.5s; }
    .logo-box:hover { transform: rotate(0deg); }
    .logo-box svg { width: 36px; height: 36px; }
    .logo-text h1 { font-size: 1.875rem; font-weight: 900; background: linear-gradient(90deg, var(--cyan-400), var(--teal-400), var(--emerald-400)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .logo-text p { font-size: 0.875rem; color: var(--slate-400); font-weight: 500; }
    .month-badge { background: var(--white-10); backdrop-filter: blur(10px); border: 1px solid var(--white-20); padding: 0.75rem 1.5rem; border-radius: 12px; font-weight: 600; color: var(--slate-200); }
    .container { position: relative; z-index: 1; max-width: 1600px; margin: 0 auto; padding: 2rem; }
    .tabs { display: flex; gap: 0.5rem; margin-bottom: 2rem; background: var(--white-10); backdrop-filter: blur(20px); border: 1px solid var(--white-20); padding: 0.5rem; border-radius: 16px; flex-wrap: wrap; }
    .tab { padding: 0.75rem 1.25rem; border: none; background: transparent; cursor: pointer; border-radius: 10px; font-family: 'Inter', sans-serif; font-weight: 600; color: var(--slate-400); transition: all 0.2s; font-size: 0.875rem; }
    .tab:hover { background: var(--white-05); color: var(--slate-200); }
    .tab.active { background: linear-gradient(135deg, var(--cyan-500), var(--teal-500)); color: white; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    .card { background: var(--white-10); backdrop-filter: blur(20px); border: 1px solid var(--white-20); border-radius: 20px; padding: 1.5rem; margin-bottom: 1.5rem; }
    .card-title { font-size: 1.125rem; font-weight: 700; margin-bottom: 1rem; color: var(--slate-100); }
    .grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1.5rem; }
    @media (max-width: 900px) { .grid-2 { grid-template-columns: 1fr; } }
    .podium-container { display: flex; justify-content: center; align-items: flex-end; gap: 1.5rem; padding: 2rem 0; min-height: 320px; }
    .podium-place { text-align: center; transition: transform 0.3s; }
    .podium-place:hover { transform: translateY(-8px); }
    .podium-avatar { width: 80px; height: 80px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 0.75rem; font-size: 2rem; font-weight: 900; }
    .podium-name { font-weight: 700; margin-bottom: 0.25rem; font-size: 0.95rem; color: var(--slate-100); }
    .podium-score { color: var(--slate-400); font-size: 0.85rem; margin-bottom: 0.75rem; }
    .podium-block { width: 130px; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; color: white; border-radius: 12px 12px 0 0; }
    .place-1 .podium-avatar { background: linear-gradient(135deg, #ffd700, #ffec8b); color: #7c5c00; }
    .place-1 .podium-block { background: linear-gradient(135deg, #ffd700, #b8960f); height: 150px; }
    .place-2 .podium-avatar { background: linear-gradient(135deg, #c0c0c0, #e8e8e8); color: #4a4a4a; }
    .place-2 .podium-block { background: linear-gradient(135deg, #a8a8a8, #707070); height: 110px; }
    .place-3 .podium-avatar { background: linear-gradient(135deg, #cd7f32, #daa06d); color: #5c3d1e; }
    .place-3 .podium-block { background: linear-gradient(135deg, #cd7f32, #8b4513); height: 80px; }
    .rankings-list { display: flex; flex-direction: column; gap: 0.5rem; }
    .rank-item { display: grid; grid-template-columns: 45px 1fr 100px 70px; align-items: center; padding: 0.875rem 1rem; background: var(--white-05); border: 1px solid var(--white-10); border-radius: 12px; gap: 1rem; transition: all 0.2s; }
    .rank-item:hover { background: var(--white-10); transform: translateX(4px); border-color: var(--cyan-500); }
    .rank-num { font-weight: 800; font-size: 1.1rem; color: var(--cyan-400); }
    .rank-name { color: var(--slate-200); font-weight: 500; }
    .rank-region { color: var(--slate-500); font-size: 0.75rem; }
    .rank-bar { height: 6px; background: var(--white-10); border-radius: 3px; overflow: hidden; }
    .rank-bar-fill { height: 100%; border-radius: 3px; background: linear-gradient(90deg, var(--cyan-500), var(--teal-500)); }
    .rank-score { font-weight: 700; text-align: right; color: var(--emerald-400); }
    .heatmap-container { overflow-x: auto; }
    .heatmap { min-width: 900px; border-collapse: collapse; width: 100%; }
    .heatmap th, .heatmap td { padding: 0.6rem 0.5rem; text-align: center; font-size: 0.8rem; }
    .heatmap th { background: linear-gradient(135deg, var(--cyan-500), var(--teal-500)); color: white; font-weight: 700; }
    .heatmap th:first-child { text-align: left; min-width: 160px; border-radius: 8px 0 0 0; }
    .heatmap th:last-child { border-radius: 0 8px 0 0; }
    .heatmap td:first-child { text-align: left; font-weight: 600; background: var(--white-05); color: var(--slate-200); }
    .heatmap-cell { border-radius: 6px; padding: 0.4rem 0.5rem; font-weight: 700; display: inline-block; min-width: 40px; }
    .region-card { background: var(--white-10); backdrop-filter: blur(20px); border: 1px solid var(--white-20); border-radius: 20px; padding: 1.5rem; }
    .region-header { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 1rem; padding-bottom: 0.75rem; border-bottom: 1px solid var(--white-10); }
    .region-badge { padding: 0.35rem 1rem; border-radius: 20px; font-size: 0.8rem; font-weight: 700; }
    .region-gc { background: rgba(59, 130, 246, 0.2); color: #60a5fa; }
    .region-ol { background: rgba(168, 85, 247, 0.2); color: #c084fc; }
    .region-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.75rem; margin-bottom: 1rem; }
    .region-stat { text-align: center; padding: 1rem; background: var(--white-05); border-radius: 12px; }
    .region-stat-value { font-size: 1.5rem; font-weight: 800; background: linear-gradient(90deg, var(--cyan-400), var(--teal-400)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .region-stat-label { font-size: 0.75rem; color: var(--slate-400); margin-top: 0.25rem; }
    .gauge-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 1rem; }
    .gauge-item { text-align: center; padding: 1rem; background: var(--white-05); border-radius: 12px; }
    .gauge-circle { width: 80px; height: 80px; border-radius: 50%; margin: 0 auto 0.75rem; display: flex; align-items: center; justify-content: center; }
    .gauge-value { font-size: 1.25rem; font-weight: 800; color: var(--slate-100); }
    .gauge-label { font-size: 0.8rem; color: var(--slate-400); }
    .detail-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; padding-bottom: 1rem; border-bottom: 1px solid var(--white-10); }
    .detail-title { font-size: 1.5rem; font-weight: 800; color: var(--slate-100); }
    .detail-rank { background: linear-gradient(135deg, var(--cyan-500), var(--teal-500)); color: white; padding: 0.5rem 1rem; border-radius: 10px; font-weight: 800; }
    .metrics-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 0.75rem; }
    .metric-item { background: var(--white-05); padding: 1rem; border-radius: 10px; }
    .metric-label { font-size: 0.75rem; color: var(--slate-400); margin-bottom: 0.25rem; }
    .metric-value { font-size: 1.1rem; font-weight: 700; color: var(--slate-100); }
    select { padding: 0.875rem 1rem; border: 1px solid var(--white-20); border-radius: 10px; font-family: 'Inter', sans-serif; font-size: 0.9rem; background: var(--white-10); color: var(--slate-200); cursor: pointer; min-width: 200px; }
    select:focus { outline: none; border-color: var(--cyan-500); }
    select option { background: var(--slate-800); color: var(--slate-200); }
    .filter-row { display: flex; gap: 1rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
    .no-data { text-align: center; padding: 4rem 2rem; color: var(--slate-400); }
    .no-data-icon { font-size: 4rem; margin-bottom: 1rem; opacity: 0.5; }
    .chart-wrapper { position: relative; height: 300px; }
    .legend-inline { display: flex; gap: 1.5rem; justify-content: center; margin-top: 1rem; }
    .legend-item { display: flex; align-items: center; gap: 0.5rem; font-size: 0.85rem; color: var(--slate-300); }
    .legend-dot { width: 12px; height: 12px; border-radius: 50%; }
    .loading { text-align: center; padding: 4rem; color: var(--slate-400); }
    @media (max-width: 768px) {
      .header-content { flex-direction: column; gap: 1rem; text-align: center; }
      .podium-container { flex-direction: column; align-items: center; }
      .rank-item { grid-template-columns: 35px 1fr 50px; }
      .rank-bar { display: none; }
    }
  </style>
</head>
<body>
  <div class="bg-pattern"></div>
  <div class="header">
    <div class="header-content">
      <div class="logo">
        <div class="logo-icon">
          <div class="logo-box">
            <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
              <ellipse cx="30" cy="28" rx="14" ry="14" stroke="white" stroke-width="4" fill="none"/>
              <line x1="40" y1="38" x2="58" y2="56" stroke="white" stroke-width="5" stroke-linecap="round"/>
              <rect x="54" y="52" width="8" height="16" rx="2" fill="white" transform="rotate(45 58 60)"/>
              <path d="M50 50 L50 80 L75 80 L50 50Z" fill="white" opacity="0.9"/>
              <path d="M50 50 L50 80 L30 80 L50 50Z" fill="white" opacity="0.7"/>
              <path d="M20 82 Q50 76 80 82 L85 88 Q50 84 15 88 Z" fill="white"/>
              <line x1="50" y1="48" x2="50" y2="82" stroke="white" stroke-width="2"/>
            </svg>
          </div>
        </div>
        <div class="logo-text">
          <h1>The Spyglass Regatta</h1>
          <p>Performance • Rankings • Excellence</p>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:1rem;">
        <select id="monthSelect"></select>
        <div class="month-badge" id="currentMonth">Loading...</div>
      </div>
    </div>
  </div>
  <div class="container">
    <div class="tabs">
      <button class="tab active" data-tab="podium">🏆 Podium</button>
      <button class="tab" data-tab="heatmap">🔥 Heat Map</button>
      <button class="tab" data-tab="building">🏢 Building Detail</button>
      <button class="tab" data-tab="regional">🗺️ Regional</button>
    </div>
    <div id="podium" class="tab-content active">
      <div class="card"><div class="card-title">🏆 Top Performers</div><div id="podiumContent"><div class="loading">Loading data...</div></div></div>
      <div class="card"><div class="card-title">Complete Rankings</div><div id="quickRankings"></div></div>
    </div>
    <div id="heatmap" class="tab-content">
      <div class="card">
        <div class="card-title">🔥 Raw Metrics by Building</div>
        <p style="color:var(--slate-400);margin-bottom:1rem;font-size:0.9rem">Raw metric values for each building</p>
        <div class="heatmap-container"><table class="heatmap" id="heatmapTable"></table></div>
      </div>
    </div>
    <div id="building" class="tab-content">
      <div class="filter-row"><select id="buildingSelect"><option value="">Select a Building</option></select></div>
      <div id="buildingContent"></div>
    </div>
    <div id="regional" class="tab-content">
      <div class="grid-2">
        <div class="region-card">
          <div class="region-header"><span class="region-badge region-gc">Golden Coast</span><span style="font-weight:600;color:var(--slate-300)">9 Buildings</span></div>
          <div class="region-stats" id="gcStats"></div><div id="gcTopBuildings"></div>
        </div>
        <div class="region-card">
          <div class="region-header"><span class="region-badge region-ol">Overland</span><span style="font-weight:600;color:var(--slate-300)">8 Buildings</span></div>
          <div class="region-stats" id="olStats"></div><div id="olTopBuildings"></div>
        </div>
      </div>
    </div>
  </div>
  <script>
    const BUILDINGS = [
      { name: "Gilroy HC", region: "Golden Coast" },
      { name: "Camino Ridge Post Acute", region: "Golden Coast" },
      { name: "Los Altos Post Acute", region: "Golden Coast" },
      { name: "The Win Post Acute", region: "Golden Coast" },
      { name: "Pac Coast PA", region: "Golden Coast" },
      { name: "PAC Hills Post Acute", region: "Golden Coast" },
      { name: "Manresa HC", region: "Golden Coast" },
      { name: "Morgan Hill HC", region: "Golden Coast" },
      { name: "Mountain View HC", region: "Golden Coast" },
      { name: "Eden HC", region: "Overland" },
      { name: "West Shore PA", region: "Overland" },
      { name: "Golden Harbor HC", region: "Overland" },
      { name: "Belmont HC", region: "Overland" },
      { name: "Palo Alto Post Acute", region: "Overland" },
      { name: "Bridgewood PA", region: "Overland" },
      { name: "Cedarwood PA", region: "Overland" },
      { name: "Capital PA", region: "Overland" }
    ];
    
    const CATEGORIES = {
      care: { name: "Care (26%)", metrics: [
        { key: "healthInspections", label: "Health Inspections" },
        { key: "qmRating", label: "QM Rating" },
        { key: "rehospitalization", label: "Rehospitalization %" },
        { key: "dischargeFunctional", label: "Discharge Functional %" }
      ]},
      census: { name: "Census (20%)", metrics: [
        { key: "occupancy", label: "Occupancy %" },
        { key: "medicareCensus", label: "Medicare Census %" },
        { key: "skilledMix", label: "Skilled Mix #" }
      ]},
      collections: { name: "Collections (10%)", metrics: [
        { key: "badDebt", label: "Bad Debt %" },
        { key: "dso", label: "DSO" }
      ]},
      controls: { name: "Controls (14%)", metrics: [
        { key: "noi", label: "NOI %" },
        { key: "labor", label: "Labor %" },
        { key: "otdt", label: "OT/DT %" },
        { key: "rehabProductivity", label: "Rehab Productivity %" }
      ]},
      culture: { name: "Culture (12%)", metrics: [
        { key: "turnover", label: "Turnover %" },
        { key: "workerSafety", label: "Worker Safety" }
      ]},
      compliance: { name: "Compliance (10%)", metrics: [
        { key: "admissionPacket", label: "Admission Packet %" },
        { key: "arbitration", label: "Arbitration %" },
        { key: "substandardQoc", label: "Substandard QoC" }
      ]},
      credibility: { name: "Credibility (8%)", metrics: [
        { key: "googleRating", label: "Google Rating" },
        { key: "yelpRating", label: "Yelp Rating" },
        { key: "legalClaims", label: "Legal Claims" }
      ]}
    };
    
    let allData = [];
    let currentData = null;

    document.addEventListener('DOMContentLoaded', async () => {
      await loadDataFromJSON();
      initTabs();
      initSelects();
      initMonthSelect();
      updateAllDisplays();
    });

    async function loadDataFromJSON() {
      try {
        const response = await fetch('data.json');
        const jsonData = await response.json();
        Object.entries(jsonData).forEach(([month, buildingData]) => {
          allData.push({ month, buildingData });
        });
        currentData = allData[allData.length - 1];
      } catch (err) {
        console.error('Error loading data:', err);
        document.getElementById('podiumContent').innerHTML = '<div class="no-data"><div class="no-data-icon">❌</div><p>Error loading data.json</p></div>';
      }
    }

    function initMonthSelect() {
      const select = document.getElementById('monthSelect');
      select.innerHTML = '';
      allData.forEach((d, i) => {
        const opt = document.createElement('option');
        opt.value = i;
        opt.textContent = d.month;
        if (i === allData.length - 1) opt.selected = true;
        select.appendChild(opt);
      });
      select.addEventListener('change', e => {
        currentData = allData[parseInt(e.target.value)];
        updateAllDisplays();
      });
    }

    function initTabs() {
      document.querySelectorAll('.tab').forEach(tab => {
        tab.addEventListener('click', () => {
          document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
          document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
          tab.classList.add('active');
          document.getElementById(tab.dataset.tab).classList.add('active');
        });
      });
    }

    function initSelects() {
      const select = document.getElementById('buildingSelect');
      BUILDINGS.forEach(b => { 
        const opt = document.createElement('option'); 
        opt.value = b.name; 
        opt.textContent = b.name; 
        select.appendChild(opt); 
      });
      select.addEventListener('change', e => renderBuildingDetail(e.target.value));
    }

    function getRanked() {
      // Use _score and _rank from data.json (from Rankings Summary)
      return BUILDINGS.map(b => ({
        ...b,
        score: currentData.buildingData[b.name]._score,
        rank: currentData.buildingData[b.name]._rank,
        metrics: currentData.buildingData[b.name]
      })).sort((a, b) => a.rank - b.rank);
    }

    function updateAllDisplays() {
      document.getElementById('currentMonth').textContent = currentData ? currentData.month : 'No Data';
      renderPodium();
      renderQuickRankings();
      renderHeatMap();
      renderRegionalStats();
      const bs = document.getElementById('buildingSelect');
      if (bs.value) renderBuildingDetail(bs.value);
    }

    function renderPodium() {
      if (!currentData) return;
      const ranked = getRanked();
      document.getElementById('podiumContent').innerHTML = `<div class="podium-container">
        <div class="podium-place place-2"><div class="podium-avatar">2</div><div class="podium-name">${ranked[1].name}</div><div class="podium-score">${ranked[1].score.toFixed(1)} pts</div><div class="podium-block">🥈</div></div>
        <div class="podium-place place-1"><div class="podium-avatar">1</div><div class="podium-name">${ranked[0].name}</div><div class="podium-score">${ranked[0].score.toFixed(1)} pts</div><div class="podium-block">🥇</div></div>
        <div class="podium-place place-3"><div class="podium-avatar">3</div><div class="podium-name">${ranked[2].name}</div><div class="podium-score">${ranked[2].score.toFixed(1)} pts</div><div class="podium-block">🥉</div></div>
      </div>`;
    }

    function renderQuickRankings() {
      if (!currentData) return;
      const ranked = getRanked();
      const max = ranked[0].score;
      document.getElementById('quickRankings').innerHTML = `<div class="rankings-list">${ranked.map((r, i) => `
        <div class="rank-item"><span class="rank-num">${r.rank}</span><div><span class="rank-name">${r.name}</span><div class="rank-region">${r.region}</div></div>
        <div class="rank-bar"><div class="rank-bar-fill" style="width:${(r.score/max)*100}%"></div></div><span class="rank-score">${r.score.toFixed(1)}</span></div>
      `).join('')}</div>`;
    }

    function renderHeatMap() {
      if (!currentData) return;
      const ranked = getRanked();
      const metrics = ['healthInspections','qmRating','rehospitalization','dischargeFunctional','occupancy','medicareCensus','skilledMix','badDebt','dso','otdt','rehabProductivity','turnover','admissionPacket','arbitration','googleRating','yelpRating','legalClaims'];
      const labels = ['Health Insp','QM','Rehosp','Disch Func','Occ','Med Cens','Skilled','Bad Debt','DSO','OT/DT','Rehab Prod','Turnover','Adm Pkt','Arb','Google','Yelp','Legal'];
      
      let html = `<thead><tr><th>Building</th>${labels.map(l => `<th>${l}</th>`).join('')}<th>Score</th></tr></thead><tbody>`;
      ranked.forEach(r => {
        html += `<tr><td>${r.name}</td>`;
        metrics.forEach(m => {
          const val = r.metrics[m];
          html += `<td>${val !== null ? val : '-'}</td>`;
        });
        html += `<td><strong style="color:#22d3ee">${r.score.toFixed(1)}</strong></td></tr>`;
      });
      html += '</tbody>';
      document.getElementById('heatmapTable').innerHTML = html;
    }

    function renderRegionalStats() {
      if (!currentData) return;
      const ranked = getRanked();
      const gc = ranked.filter(r => r.region === 'Golden Coast');
      const ol = ranked.filter(r => r.region === 'Overland');
      const avgGC = gc.reduce((s, r) => s + r.score, 0) / gc.length;
      const avgOL = ol.reduce((s, r) => s + r.score, 0) / ol.length;
      
      document.getElementById('gcStats').innerHTML = `<div class="region-stat"><div class="region-stat-value">${avgGC.toFixed(1)}</div><div class="region-stat-label">Avg Score</div></div><div class="region-stat"><div class="region-stat-value">${gc[0].score.toFixed(1)}</div><div class="region-stat-label">Top Score</div></div><div class="region-stat"><div class="region-stat-value">#${gc[0].rank}</div><div class="region-stat-label">Best Rank</div></div>`;
      document.getElementById('olStats').innerHTML = `<div class="region-stat"><div class="region-stat-value">${avgOL.toFixed(1)}</div><div class="region-stat-label">Avg Score</div></div><div class="region-stat"><div class="region-stat-value">${ol[0].score.toFixed(1)}</div><div class="region-stat-label">Top Score</div></div><div class="region-stat"><div class="region-stat-value">#${ol[0].rank}</div><div class="region-stat-label">Best Rank</div></div>`;
      document.getElementById('gcTopBuildings').innerHTML = `<div style="font-size:0.9rem">${gc.slice(0,3).map((r,i) => `<div style="padding:0.5rem 0;border-bottom:1px solid rgba(255,255,255,0.1)">${['🥇','🥈','🥉'][i]} ${r.name} - ${r.score.toFixed(1)}</div>`).join('')}</div>`;
      document.getElementById('olTopBuildings').innerHTML = `<div style="font-size:0.9rem">${ol.slice(0,3).map((r,i) => `<div style="padding:0.5rem 0;border-bottom:1px solid rgba(255,255,255,0.1)">${['🥇','🥈','🥉'][i]} ${r.name} - ${r.score.toFixed(1)}</div>`).join('')}</div>`;
    }

    function renderBuildingDetail(name) {
      if (!name || !currentData) { 
        document.getElementById('buildingContent').innerHTML = '<div class="no-data"><div class="no-data-icon">🏢</div><p>Select a building</p></div>'; 
        return; 
      }
      const building = BUILDINGS.find(b => b.name === name);
      const metrics = currentData.buildingData[name];
      const score = metrics._score;
      const rank = metrics._rank;
      
      document.getElementById('buildingContent').innerHTML = `<div class="card">
        <div class="detail-header">
          <div><div class="detail-title">${name}</div><span style="color:var(--slate-400)">${building.region}</span></div>
          <div style="text-align:right"><div class="detail-rank">Rank #${rank}</div><div style="font-size:1.5rem;font-weight:800;margin-top:0.5rem;background:linear-gradient(90deg,#22d3ee,#14b8a6);-webkit-background-clip:text;-webkit-text-fill-color:transparent">${score.toFixed(1)} pts</div></div>
        </div>
        ${Object.entries(CATEGORIES).map(([k, cat]) => `
          <div style="margin-bottom:1.5rem">
            <div style="font-weight:700;margin-bottom:0.75rem;color:var(--slate-200)">${cat.name}</div>
            <div class="metrics-grid">
              ${cat.metrics.map(m => `<div class="metric-item"><div class="metric-label">${m.label}</div><div class="metric-value">${metrics[m.key] !== null ? metrics[m.key] : 'N/A'}</div></div>`).join('')}
            </div>
          </div>
        `).join('')}
      </div>`;
    }
  </script>
</body>
</html>
